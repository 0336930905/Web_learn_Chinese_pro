<script>
// ========== Helper: Get categoryId from URL ==========
function getCategoryIdFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get('categoryId');
}

// ========== State ==========
let questions = [];
let currentIndex = 0;
let score = 0;
let timer = null;
let timeLeft = 15;
let gameStartTime = Date.now();

// ========== Load Questions ==========
async function loadQuestions() {
    const categoryId = getCategoryIdFromUrl();
    if (!categoryId) {
        alert('KhÃ´ng tÃ¬m tháº¥y categoryId!');
        window.location.href = '../user/games_home.html';
        return;
    }
    
    gameStartTime = Date.now(); // Reset timer
    
    try {
        const res = await fetch(`/api/games/reverse-quiz?categoryId=${categoryId}`);
        const data = await res.json();
        if (!data.success) {
            alert('KhÃ´ng thá»ƒ táº£i cÃ¢u há»i: ' + (data.error?.message || 'Lá»—i khÃ´ng xÃ¡c Ä‘á»‹nh'));
            window.location.href = '../user/games_home.html';
            return;
        }
        questions = data.data;
        currentIndex = 0;
        score = 0;
        
        // Initialize header with unified function
        if (window.updateGameHeaderProgress) {
            window.updateGameHeaderProgress({
                current: 1,
                total: questions.length,
                score: 0,
                label: 'Question',
                animateScore: false
            });
        }
        
        renderQuestion();
    } catch (err) {
        alert('Lá»—i khi gá»i API: ' + err.message);
        window.location.href = '../user/games_home.html';
    }
}

// ========== Render Question ==========
function renderQuestion() {
    const q = questions[currentIndex];
    if (!q) {
        renderResult();
        return;
    }

    // Update progress
    updateProgress();

    // Reset timer
    resetTimer();

    // Update Traditional Chinese word display
    const wordText = document.getElementById('questionWordText');
    if (wordText) {
        // Re-trigger wordPop animation
        wordText.style.animation = 'none';
        wordText.offsetHeight; // reflow
        wordText.style.animation = '';
        wordText.textContent = q.traditional || q.simplified || '';
    }

    // Update pinyin hint
    const hintEl = document.getElementById('hintPinyin');
    if (hintEl) hintEl.textContent = q.pinyin || q.hint || '\u2014';

    // Render options
    const optionsContainer = document.getElementById('optionsGrid');
    if (!optionsContainer) { console.error('optionsGrid not found'); return; }
    optionsContainer.innerHTML = '';

    const letters = ['A', 'B', 'C', 'D'];
    const iconOpts = [
        { icon: 'sentiment_very_satisfied', bg: 'bg-blue-50 dark:bg-blue-900/20',   text: 'text-blue-500'   },
        { icon: 'favorite',                 bg: 'bg-orange-50 dark:bg-orange-900/20', text: 'text-orange-500' },
        { icon: 'star',                     bg: 'bg-green-50 dark:bg-green-900/20',  text: 'text-green-500'  },
        { icon: 'emoji_objects',            bg: 'bg-purple-50 dark:bg-purple-900/20', text: 'text-purple-500' },
    ];

    q.options.forEach((opt, idx) => {
        const io = iconOpts[idx];
        const btn = document.createElement('button');
        btn.className = 'answer-btn group relative flex flex-col items-center justify-center pt-6 pb-4 px-3 sm:px-4 h-28 sm:h-32 md:h-36 rounded-2xl bg-white dark:bg-surface-dark border-2 border-gray-100 dark:border-gray-700 border-b-4 hover:border-primary hover:border-b-primary active:translate-y-1 active:scale-[0.97] transition-all duration-150 shadow-sm hover:shadow-lg hover:shadow-primary/10 cursor-pointer';
        btn.dataset.idx = idx;
        btn.onclick = () => selectAnswer(idx);
        btn.innerHTML = `
            <span class="option-letter">${letters[idx]}</span>
            <div class="size-8 sm:size-9 mb-1.5 rounded-full ${io.bg} ${io.text} flex items-center justify-center group-hover:scale-110 transition-transform">
                <span class="material-symbols-outlined text-lg">${io.icon}</span>
            </div>
            <span class="meaning-text text-sm sm:text-base md:text-lg font-bold text-gray-700 dark:text-gray-200 group-hover:text-primary transition-colors text-center leading-snug">${opt.meaning}</span>
            <div class="absolute inset-0 rounded-2xl ring-2 ring-transparent group-hover:ring-primary/30 pointer-events-none transition-all"></div>
        `;
        optionsContainer.appendChild(btn);
    });

    // Update listen button
    const listenBtn = document.getElementById('listenBtn');
    if (listenBtn) listenBtn.onclick = () => speakQuestion();
}

// ========== Timer Functions ==========
function resetTimer() {
    if (timer) clearInterval(timer);
    timeLeft = 15;
    updateTimerDisplay();
    
    timer = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();
        
        if (timeLeft <= 0) {
            clearInterval(timer);
            // Auto move to next question when time's up
            setTimeout(() => {
                currentIndex++;
                renderQuestion();
            }, 500);
        }
    }, 1000);
}

function updateTimerDisplay() {
    const timerText = document.getElementById('timerText');
    if (timerText) timerText.textContent = timeLeft;

    const circle = document.getElementById('timerCircle');
    if (circle) {
        const progress = (timeLeft / 15) * 283;
        circle.setAttribute('stroke-dashoffset', 283 - progress);
        if (timeLeft <= 5) {
            circle.classList.remove('text-primary');
            circle.classList.add('text-red-500');
        } else {
            circle.classList.remove('text-red-500');
            circle.classList.add('text-primary');
        }
    }
}

// ========== Select Answer ==========
function selectAnswer(idx) {
    if (timer) clearInterval(timer);

    const q = questions[currentIndex];
    const isCorrect = q.options[idx].isCorrect;
    const optionsContainer = document.getElementById('optionsGrid');
    if (!optionsContainer) return;
    const buttons = Array.from(optionsContainer.children);

    buttons.forEach((btn, i) => {
        btn.disabled = true;
        btn.classList.remove('hover:border-primary', 'hover:shadow-lg', 'hover:shadow-primary/10');

        if (q.options[i].isCorrect) {
            btn.classList.remove('border-gray-100', 'border-b-4');
            btn.classList.add('border-green-400', 'bg-green-50', 'dark:bg-green-900/20');
            btn.querySelector('.meaning-text')?.classList.add('text-green-600');
            const letter = btn.querySelector('.option-letter');

// ========== Animate Value Count-up ==========
function animateValue(element, target, duration) {
    const isPercentage = target.includes('%');
    const isFraction = target.includes('/');
    
    if (isFraction) {
        const [numerator, denominator] = target.split('/').map(Number);
        let current = 0;
        const increment = numerator / (duration / 16);
        const timer = setInterval(() => {
            current += increment;
            if (current >= numerator) {
                element.textContent = target;
                clearInterval(timer);
            } else {
                element.textContent = `${Math.floor(current)}/${denominator}`;
            }
        }, 16);
    } else if (isPercentage) {
        const targetNum = parseInt(target);
        let current = 0;
        const increment = targetNum / (duration / 16);
        const timer = setInterval(() => {
            current += increment;
            if (current >= targetNum) {
                element.textContent = target;
                clearInterval(timer);
            } else {
                element.textContent = `${Math.floor(current)}%`;
            }
        }, 16);
    } else {
        const targetNum = parseInt(target);
        let current = 0;
        const increment = targetNum / (duration / 16);
        const timer = setInterval(() => {
            current += increment;
            if (current >= targetNum) {
                element.textContent = target;
                clearInterval(timer);
            } else {
                element.textContent = Math.floor(current);
            }
        }, 16);
    }
}

// ========== Create Confetti Effect ==========

    for (let i = 0; i < confettiCount; i++) {

        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

        confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';

    }
}
