<!DOCTYPE html>
<html class="light" lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luyện Thoại - VocabHero</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/user-common.css" />
  <script src="/i18n/translations.js"></script>
  <script src="/js/api-client.js"></script>
  <script src="/js/sidebar.js"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary":           "#4ce64c",
            "primary-dark":      "#38c438",
            "background-light":  "#f6f8f6",
            "background-dark":   "#112111",
            "card-dark":         "#1a2e1a",
            "text-main":         "#0e1b0e",
            "text-secondary":    "#509550",
          },
          fontFamily: { display: ["Lexend", "sans-serif"], body: ["Lexend", "sans-serif"] },
          borderRadius: { DEFAULT: "1rem", lg: "1.5rem", xl: "2rem", "2xl": "2.5rem", "3xl": "3rem", full: "9999px" },
          boxShadow: {
            "soft":      "0 4px 20px -2px rgba(0,0,0,0.05)",
            "fun":       "0 6px 0px 0px rgba(76,230,76,0.2)",
            "fun-hover": "0 10px 24px 0 rgba(76,230,76,0.22)",
          },
        },
      },
    };
  </script>
  <style type="text/tailwindcss">
    .cc-900px{
     height: 520px; 
    }
    body { font-family: 'Lexend', sans-serif; }
    
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #dcfce7; border-radius: 8px; }
    ::-webkit-scrollbar-thumb:hover { background: #4ce64c; }

    details > summary { list-style: none; }
    details > summary::-webkit-details-marker { display: none; }

    .practice-card {
      @apply bg-white dark:bg-card-dark rounded-3xl border border-gray-100 dark:border-green-900/30 shadow-soft overflow-hidden;
      transition: all 0.2s ease-in-out;
    }

    .speaker-badge {
      @apply font-bold px-2.5 py-1.5 rounded-full text-xs whitespace-nowrap font-semibold;
    }

    .speaker-a {
      @apply bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300;
    }

    .speaker-b {
      @apply bg-purple-100 dark:bg-purple-900/30 text-purple-700 dark:text-purple-300;
    }

    .hanzi-text {
      @apply font-bold text-lg text-primary;
    }

    .pinyin-text {
      @apply text-primary font-semibold text-sm;
    }

    .vietnamese-text {
      @apply text-text-secondary dark:text-gray-400 italic text-sm;
    }

    .dialogue-details {
      @apply bg-white dark:bg-zinc-800/50 rounded-lg transition-all border-2 border-transparent 
             hover:border-primary/30 dark:hover:border-primary/50 shadow-sm hover:shadow-md;
    }

    .dialogue-details[open] {
      @apply border-primary/60 shadow-md bg-primary/5 dark:bg-primary/10;
    }

    .dialogue-details summary:hover {
      @apply bg-primary/5 dark:bg-primary/10;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-in {
      animation: slideIn 0.3s ease-out;
    }

    .line-highlight {
      @apply bg-primary/25 dark:bg-primary/40 border-l-4 border-primary pl-3;
      animation: highlight 0.4s ease-out;
    }

    @keyframes highlight {
      from { background-color: rgba(76, 230, 76, 0.5); transform: scale(1.01); }
      to { background-color: rgba(76, 230, 76, 0.25); }
    }

    .karaoke-mode-enter {
      @apply scale-95 opacity-0;
      animation: fadeInScale 0.3s ease-out forwards;
    }

    @keyframes fadeInScale {
      to { @apply scale-100 opacity-100; }
    }

    /* Button styles */
    button {
      @apply transition-all duration-200;
    }

    @media (max-width: 640px) {
      .cc-900px {
        height: 400px;
      }
    }

    select {
      @apply px-3 py-1.5 text-xs font-medium bg-white dark:bg-card-dark border border-gray-200 dark:border-zinc-700 text-text-main dark:text-white rounded-lg hover:border-primary/50 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all cursor-pointer;
    }

    .word-puzzle-game {
      @apply min-h-full bg-gradient-to-br from-primary/20 via-purple-100/50 to-transparent dark:from-purple-900/20 dark:via-purple-900/10 dark:to-transparent;
    }

    .word-item {
      @apply px-4 py-3 rounded-lg border-2 border-gray-200 dark:border-zinc-600 bg-white dark:bg-zinc-800 cursor-move transition-all hover:border-primary/50 hover:shadow-md select-none font-bold text-lg;
    }

    .word-item.selected {
      @apply border-primary/60 bg-primary/10 dark:bg-primary/20 shadow-md;
    }

    .answer-box {
      @apply min-h-20 p-3 rounded-xl border-2 border-dashed border-gray-300 dark:border-zinc-600 bg-gray-50 dark:bg-zinc-900 flex flex-wrap gap-2 items-start content-start;
    }

    .answer-item {
      @apply px-3 py-2 rounded-lg bg-primary/20 text-primary dark:bg-primary/30 dark:text-white border border-primary/50 cursor-pointer hover:bg-primary/30 transition-all font-semibold;
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-text-main dark:text-white overflow-hidden">

<div class="flex h-screen w-full overflow-hidden">
  <div id="sidebar-container"></div>

  <main class="flex-1 ml-0 md:ml-64 overflow-y-auto bg-background-light dark:bg-background-dark relative transition-all duration-300">
    <!-- Decorative background blobs -->
    <div class="absolute top-0 right-0 -z-10 h-96 w-96 translate-x-1/3 -translate-y-1/3 rounded-full bg-primary/10 blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-0 left-0 -z-10 h-64 w-64 -translate-x-1/3 translate-y-1/3 rounded-full bg-blue-400/10 blur-3xl pointer-events-none"></div>
    
    <div class="mx-auto max-w-5xl px-4 md:px-8 py-6 md:py-8 pt-20 md:pt-8">
      
      <!-- Header -->
      <header class="mb-8 flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
        <div class="flex items-center gap-3">
          <div class="p-3 rounded-xl bg-primary/20 dark:bg-primary/30 backdrop-blur-sm">
            <span class="material-symbols-outlined text-primary text-2xl">chat</span>
          </div>
          <div>
            <h1 id="dialogueTitle" class="text-3xl font-bold text-text-main dark:text-white">Luyện Thoại</h1>
            <p class="text-sm text-text-secondary dark:text-gray-400">Nhấp vào từng dòng để xem phiên âm và dịch nghĩa</p>
          </div>
        </div>
        <button onclick="goBack()" class="flex items-center gap-2 px-4 py-2 bg-red-500/20 hover:bg-red-500/30 text-red-600 dark:text-red-400 rounded-xl font-medium transition-all">
          <span class="material-symbols-outlined text-lg">close</span>
          <span class="hidden sm:inline">Quay lại</span>
        </button>
      </header>

      <!-- Main Content Card -->
      <div class="practice-card bg-white dark:bg-card-dark rounded-3xl border border-gray-100 dark:border-green-900/30 shadow-soft overflow-hidden">
        
        <!-- Header with Controls -->
        <div class="bg-gradient-to-br from-primary/20 via-green-100/50 to-transparent dark:from-primary/20 dark:via-green-900/20 dark:to-transparent px-6 py-5 border-b border-gray-100 dark:border-green-900/20">
          <div class="flex items-center justify-between flex-wrap gap-3">
            <div class="flex items-center gap-2">
              <span class="material-symbols-outlined text-primary text-xl">list</span>
              <h2 class="font-semibold text-text-main dark:text-white">Danh sách hội thoại</h2>
            </div>
            <div class="flex gap-2 items-center flex-wrap">
              <div class="flex items-center gap-1.5">
                <span class="material-symbols-outlined text-sm text-primary">volume_up</span>
                <select id="voiceSelect" title="Chọn giọng đọc" class="text-xs max-w-xs">
                  <option value="">-- Giọng đọc --</option>
                </select>
              </div>
              <select id="rateSelect" title="Chọn tốc độ" class="text-xs" onchange="selectedRate = parseFloat(this.value)">
                <option value="0.25">0.25x</option>
                <option value="0.5">0.5x</option>
                <option value="0.8" selected>0.8x</option>
                <option value="1.0">1.0x</option>
              </select>
              <div class="h-5 border-r border-gray-200 dark:border-zinc-700"></div>
              <button onclick="expandAll()" title="Mở tất cả" class="px-3 py-1.5 text-xs font-medium bg-white dark:bg-card-dark border border-gray-200 dark:border-zinc-700 text-text-main dark:text-white rounded-lg hover:bg-primary/10 transition-all">
                <span class="material-symbols-outlined inline text-sm mr-1">unfold_more</span>Mở
              </button>
              <button onclick="collapseAll()" title="Đóng tất cả" class="px-3 py-1.5 text-xs font-medium bg-white dark:bg-card-dark border border-gray-200 dark:border-zinc-700 text-text-main dark:text-white rounded-lg hover:bg-primary/10 transition-all">
                <span class="material-symbols-outlined inline text-sm mr-1">unfold_less</span>Đóng
              </button>
              <div class="h-5 border-r border-gray-200 dark:border-zinc-700"></div>
              <button onclick="enterWordPuzzleMode()" title="Trò chơi ghép chữ" class="px-4 py-1.5 text-xs font-semibold bg-gradient-to-r from-purple-500 to-purple-600 text-white rounded-lg shadow-soft hover:shadow-fun transition-all hover:-translate-y-0.5 flex items-center gap-1.5">
                <span class="material-symbols-outlined text-sm">puzzle</span>
                <span class="hidden sm:inline">Ghép Chữ</span>
              </button>
              <button onclick="enterKaraokeMode()" class="px-4 py-1.5 text-xs font-semibold bg-gradient-to-r from-blue-500 to-blue-600 text-white rounded-lg shadow-soft hover:shadow-fun transition-all hover:-translate-y-0.5 flex items-center gap-1.5">
                <span class="material-symbols-outlined text-sm">play_circle</span>
                <span class="hidden sm:inline">Phát</span>
              </button>
            </div>
          </div>
        </div>

        <!-- List Mode Container -->
        <div id="listModeContainer" class="p-6 md:p-8 cc-900px overflow-y-auto">
          <div id="dialogueContainer" class="space-y-3">
            <!-- Dynamically rendered -->
          </div>
        </div>

        <!-- Karaoke Mode Container (Hidden by default) -->
        <div id="karaokeModeContainer" class="hidden p-6 md:p-8 flex flex-col karaoke-mode-enter">
          <!-- Header -->
          <div class="flex items-center justify-between mb-6 pb-6 border-b border-gray-100 dark:border-zinc-700">
            <div class="flex items-center gap-3">
              <span class="material-symbols-outlined text-primary text-2xl">play_circle</span>
              <h2 class="text-2xl font-bold text-text-main dark:text-white">Phát toàn bộ</h2>
            </div>
            <button onclick="exitKaraokeMode()" class="flex items-center gap-2 px-4 py-2 bg-red-500/20 hover:bg-red-500/30 text-red-600 dark:text-red-400 rounded-xl font-medium transition-all">
              <span class="material-symbols-outlined text-base">close</span>
              Thoát
            </button>
          </div>

          <!-- Progress Bar -->
          <div class="mb-6">
            <div class="flex justify-between items-center mb-3">
              <span class="text-sm font-semibold text-text-secondary">Tiến độ</span>
              <span class="text-sm font-bold bg-primary/20 text-primary px-3 py-1 rounded-full" id="karaokeProgress">0/0</span>
            </div>
            <div class="w-full h-2.5 bg-gray-200 dark:bg-zinc-700 rounded-full overflow-hidden">
              <div id="karaokeProgressBar" class="h-full bg-gradient-to-r from-primary to-blue-500 transition-all duration-300" style="width: 0%"></div>
            </div>
          </div>

          <!-- Karaoke Text Display -->
          <div id="karaokeTextContainer" class="bg-gray-50 dark:bg-background-dark rounded-2xl p-6 mb-6 min-h-80 flex flex-col justify-start space-y-3 max-h-80 overflow-y-auto flex-1">
            <!-- Lines rendered here -->
          </div>

          <!-- Karaoke Controls -->
          <div class="flex gap-3 items-center justify-center">
            <button id="karaokePlayBtn" onclick="toggleKaraokePlayPause()" class="flex items-center gap-2 px-6 py-3 bg-primary text-text-main rounded-xl font-bold shadow-fun hover:shadow-fun-hover transition-all hover:-translate-y-0.5">
              <span class="material-symbols-outlined text-lg" id="karaokePlayIcon">play_circle</span>
              <span id="karaokePlayText">Phát</span>
            </button>
            <button onclick="stopKaraoke()" class="flex items-center gap-2 px-6 py-3 bg-gray-200 dark:bg-zinc-700 text-text-main dark:text-white rounded-xl font-bold transition-all hover:bg-gray-300 dark:hover:bg-zinc-600">
              <span class="material-symbols-outlined text-lg">stop_circle</span>
              Dừng
            </button>
          </div>
        </div>

        <!-- Word Puzzle Mode Container (Hidden by default) -->
        <div id="wordPuzzleModeContainer" class="hidden p-6 md:p-8 flex flex-col karaoke-mode-enter">
          <!-- Header -->
          <div class="flex items-center justify-between mb-6 pb-6 border-b border-gray-100 dark:border-zinc-700">
            <div class="flex items-center gap-3">
              <span class="material-symbols-outlined text-purple-500 text-2xl">puzzle</span>
              <div>
                <h2 class="text-2xl font-bold text-text-main dark:text-white">Ghép Chữ</h2>
                <p class="text-xs text-text-secondary">Sắp xếp lại các chữ để tạo thành câu đúng</p>
              </div>
            </div>
            <button onclick="exitWordPuzzleMode()" class="flex items-center gap-2 px-4 py-2 bg-red-500/20 hover:bg-red-500/30 text-red-600 dark:text-red-400 rounded-xl font-medium transition-all">
              <span class="material-symbols-outlined text-base">close</span>
              Thoát
            </button>
          </div>

          <!-- Puzzle Content -->
          <div class="flex-1 flex flex-col gap-6 mb-6">
            <!-- Current Dialogue Line -->
            <div>
              <p class="text-sm font-semibold text-text-secondary mb-2">Câu <span id="puzzleCurrentIndex">1</span> / <span id="puzzleTotalCount">0</span></p>
              <div class="p-4 rounded-xl bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-900/50">
                <div class="flex items-start justify-between gap-2">
                  <div class="flex-1">
                    <p class="text-sm text-text-secondary dark:text-gray-400 mb-2 hidden">Gốc: <span id="puzzleOriginal" class="font-semibold text-primary text-lg"></span></p>

                    <p id="puzzlePinyinContainer" class="text-xs text-text-secondary dark:text-gray-400 hidden transition-all duration-300">Phiên âm: <span id="puzzlePinyin" class="italic text-purple-600 dark:text-purple-300"></span></p>
                  </div>

              </div>
            </div>

            <!-- Available Words -->
            <div>
              <p class="text-sm font-semibold text-text-secondary mb-2">Chọn chữ</p>
              <div id="puzzleWordsContainer" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-2">
                <!-- Words will be rendered here -->
              </div>
            </div>
          </div>

          <!-- Controls -->
          <div class="flex gap-3 items-center justify-center border-t border-gray-100 dark:border-zinc-700 pt-6">
            <button onclick="resetPuzzle()" class="flex items-center gap-2 px-6 py-3 bg-gray-200 dark:bg-zinc-700 text-text-main dark:text-white rounded-xl font-bold transition-all hover:bg-gray-300 dark:hover:bg-zinc-600">
              <span class="material-symbols-outlined text-lg">refresh</span>
              Làm lại
            </button>
            <button onclick="checkPuzzleAnswer()" class="flex items-center gap-2 px-6 py-3 bg-primary text-text-main rounded-xl font-bold shadow-fun hover:shadow-fun-hover transition-all hover:-translate-y-0.5">
              <span class="material-symbols-outlined text-lg">check_circle</span>
              Kiểm tra
            </button>
            <button onclick="nextPuzzleLine()" class="flex items-center gap-2 px-6 py-3 bg-blue-500 text-white rounded-xl font-bold shadow-soft hover:shadow-fun transition-all hover:-translate-y-0.5">
              <span class="material-symbols-outlined text-lg">navigate_next</span>
              Tiếp theo
            </button>
          </div>
        </div>

      </div><!-- /practice-card -->

    </div>
  </main>
</div>

<!-- Toast Container -->
<div id="toastContainer" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

<script>
// ==================== STATE ====================
let dialogueData = null;
let dialogueEntries = [];
let isKaraokeMode = false;
let karaokeIndex = 0;
let isKaraokePlaying = false;
let karaokeUtterance = null;
let selectedVoice = null;
let selectedRate = 0.8;
let isWordPuzzleMode = false;
let wordPuzzleData = null;
let selectedWordPuzzleIndex = 0;
let showPinyinHints = {}; // Track which puzzles have shown pinyin

// ==================== INITIALIZE ====================
document.addEventListener('DOMContentLoaded', async function() {
  try {
    console.log('📄 DOM Loaded - Initializing Dialogue View');
    renderSidebar('dialogues', null);
    
    // Initialize voice dropdown
    initializeVoiceSelect();
    
    // Get dialogue data from session storage or URL params
    const sessionData = sessionStorage.getItem('dialogueGameData');
    const urlParams = new URLSearchParams(window.location.search);
    
    if (sessionData) {
      const data = JSON.parse(sessionData);
      dialogueData = data.dialogue;
      sessionStorage.removeItem('dialogueGameData');
    } else if (urlParams.has('dialogueId')) {
      const dialogueId = urlParams.get('dialogueId');
      await loadDialogueById(dialogueId);
    }

    if (!dialogueData) {
      showToast('Không tìm thấy dữ liệu cuộc thoại', 'error');
      setTimeout(() => goBack(), 2000);
      return;
    }

    // Initialize
    initializeDialogue();
    renderDialogueView();
    
    console.log('✅ Dialogue view initialized!');
  } catch (err) {
    console.error('❌ Error initializing:', err);
    showToast('Lỗi khởi tạo: ' + err.message, 'error');
  }
});

// ==================== LOAD DIALOGUE ====================
async function loadDialogueById(dialogueId) {
  try {
    const response = await apiClient.get(`/dialogues/dialogues/${dialogueId}`);
    if (response.success && response.data) {
      dialogueData = response.data;
    }
  } catch (error) {
    console.error('Error loading dialogue:', error);
  }
}

// ==================== VOICE INITIALIZATION ====================
function initializeVoiceSelect() {
  const voiceSelect = document.getElementById('voiceSelect');
  if (!voiceSelect) return;

  // Get available voices
  const voices = speechSynthesis.getVoices();
  const chineseVoices = voices.filter(v => v.lang.includes('zh') || v.lang.includes('CN'));
  
  // If no Chinese voices, show all available
  const voicesToUse = chineseVoices.length > 0 ? chineseVoices : voices;
  
  voicesToUse.forEach((voice, index) => {
    const option = document.createElement('option');
    option.value = index.toString();
    option.textContent = `${voice.name} (${voice.lang})`;
    voiceSelect.appendChild(option);
  });

  // Set default voice if available
  if (voicesToUse.length > 0) {
    selectedVoice = voicesToUse[0];
    voiceSelect.addEventListener('change', (e) => {
      const index = parseInt(e.target.value);
      if (voicesToUse[index]) {
        selectedVoice = voicesToUse[index];
      }
    });
  }
}

// ==================== DIALOGUE INITIALIZATION ====================
function initializeDialogue() {
  if (!dialogueData) return;

  // Get all entries
  dialogueEntries = dialogueData.entries || [];
  if (dialogueEntries.length === 0 && dialogueData.hanzi) {
    dialogueEntries = [{
      hanzi: dialogueData.hanzi,
      pinyin: dialogueData.pinyin,
      vietnamese: dialogueData.vietnamese,
      character: 'A'
    }];
  }

  // Assign characters (odd=A, even=B)
  dialogueEntries = dialogueEntries.map((entry, index) => ({
    ...entry,
    index: index + 1,
    character: (index + 1) % 2 === 1 ? 'A' : 'B'
  }));

  // Update header
  document.getElementById('dialogueTitle').textContent = dialogueData.name || dialogueData.hanzi || 'Luyện Thoại';

  console.log('Dialogue initialized:', {
    total: dialogueEntries.length,
    name: dialogueData.name
  });
}

// ==================== RENDERING ====================
function renderDialogueView() {
  const container = document.getElementById('dialogueContainer');
  container.innerHTML = dialogueEntries.map((entry, idx) => {
    const speakerClass = entry.character === 'A' ? 'speaker-a' : 'speaker-b';
    const speakerName = entry.character === 'A' ? 'A' : 'B';
    
    return `
      <details class="dialogue-details group cursor-pointer">
        <summary class="flex items-center gap-3 p-3.5 cursor-pointer">
          <button onclick="event.preventDefault(); event.stopPropagation(); playAudio('${esc(entry.hanzi)}', '${esc(entry.pinyin)}')" 
            class="w-9 h-9 flex items-center justify-center bg-primary text-white rounded-full hover:scale-110 transition-transform flex-shrink-0 shadow-sm">
            <span class="material-symbols-outlined text-sm">volume_up</span>
          </button>
          
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-0.5">
              <span class="speaker-badge ${speakerClass}">${speakerName}</span>
              <span class="hanzi-text truncate">${esc(entry.hanzi)}</span>
            </div>
            <p class="text-xs text-text-secondary dark:text-gray-500">Dòng ${entry.index}</p>
          </div>
          
          <span class="material-symbols-outlined text-text-secondary transition-transform group-open:rotate-180 flex-shrink-0 text-lg">expand_more</span>
        </summary>
        
        <div class="px-4 pb-3 pl-16 animate-in space-y-1.5 bg-primary/2 dark:bg-primary/5 border-t border-primary/20">
          <p class="pinyin-text">${esc(entry.pinyin)}</p>
          <p class="vietnamese-text">${esc(entry.vietnamese)}</p>
        </div>
      </details>
    `;
  }).join('');
}

// ==================== LIST MODE CONTROLS ====================
function expandAll() {
  document.querySelectorAll('#dialogueContainer details').forEach(d => d.open = true);
  showToast('Đã mở tất cả', 'info');
}

function collapseAll() {
  document.querySelectorAll('#dialogueContainer details').forEach(d => d.open = false);
  showToast('Đã đóng tất cả', 'info');
}

// ==================== KARAOKE MODE ====================
function enterKaraokeMode() {
  isKaraokeMode = true;
  karaokeIndex = 0;
  isKaraokePlaying = false;

  // Hide list mode, show karaoke mode
  document.getElementById('listModeContainer').classList.add('hidden');
  document.getElementById('karaokeModeContainer').classList.remove('hidden');

  // Render karaoke view
  renderKaraokeView();
  updateKaraokeProgress();
  
  showToast('Bắt đầu chế độ Karaoke 🎤', 'success');
}

function exitKaraokeMode() {
  isKaraokeMode = false;
  stopKaraoke();
  
  // Show list mode, hide karaoke mode
  document.getElementById('listModeContainer').classList.remove('hidden');
  document.getElementById('karaokeModeContainer').classList.add('hidden');
  
  showToast('Thoát chế độ Karaoke', 'info');
}

function renderKaraokeView() {
  const container = document.getElementById('karaokeTextContainer');
  container.innerHTML = dialogueEntries.map((entry, idx) => {
    const speakerClass = entry.character === 'A' ? 'speaker-a' : 'speaker-b';
    const speakerName = entry.character === 'A' ? 'A' : 'B';
    
    return `
      <div id="karaoke-line-${idx}" class="p-3.5 rounded-lg bg-white dark:bg-zinc-800/50 border-l-4 border-gray-300 dark:border-zinc-600 transition-all duration-300 hover:border-primary/50">
        <div class="flex items-center gap-2 mb-2">
          <span class="speaker-badge ${speakerClass} text-xs">${speakerName}</span>
          <span class="text-lg font-bold text-primary">${esc(entry.hanzi)}</span>
        </div>
        <p class="text-xs text-text-secondary dark:text-gray-400 mb-1">${esc(entry.pinyin)}</p>
        <p class="text-xs italic text-text-secondary dark:text-gray-500">${esc(entry.vietnamese)}</p>
      </div>
    `;
  }).join('');
}

function updateKaraokeProgress() {
  const total = dialogueEntries.length;
  const percentage = (karaokeIndex / total) * 100;
  
  document.getElementById('karaokeProgress').textContent = `${karaokeIndex}/${total}`;
  document.getElementById('karaokeProgressBar').style.width = percentage + '%';
}

function highlightCurrentLine() {
  // Remove all highlights
  document.querySelectorAll('[id^="karaoke-line-"]').forEach(el => {
    el.classList.remove('line-highlight');
  });
  
  // Add highlight to current line
  const currentLineEl = document.getElementById(`karaoke-line-${karaokeIndex}`);
  if (currentLineEl) {
    currentLineEl.classList.add('line-highlight');
    currentLineEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function toggleKaraokePlayPause() {
  if (isKaraokePlaying) {
    pauseKaraoke();
  } else {
    playKaraoke();
  }
}

function playKaraoke() {
  if (karaokeIndex >= dialogueEntries.length) {
    showToast('Đã phát hết cuộc thoại', 'info');
    return;
  }

  isKaraokePlaying = true;
  
  // Update button
  document.getElementById('karaokePlayBtn').classList.add('opacity-75');
  document.getElementById('karaokePlayIcon').textContent = 'pause_circle';
  document.getElementById('karaokePlayText').textContent = 'Tạm Dừng';

  playNextKaraokeLine();
}

function pauseKaraoke() {
  isKaraokePlaying = false;
  speechSynthesis.pause();
  
  // Update button
  document.getElementById('karaokePlayBtn').classList.remove('opacity-75');
  document.getElementById('karaokePlayIcon').textContent = 'play_circle';
  document.getElementById('karaokePlayText').textContent = 'Phát';
}

function stopKaraoke() {
  isKaraokePlaying = false;
  karaokeIndex = 0;
  speechSynthesis.cancel();
  
  // Remove all highlights
  document.querySelectorAll('[id^="karaoke-line-"]').forEach(el => {
    el.classList.remove('line-highlight');
  });
  
  updateKaraokeProgress();
  
  // Reset button
  document.getElementById('karaokePlayBtn').classList.remove('opacity-75');
  document.getElementById('karaokePlayIcon').textContent = 'play_circle';
  document.getElementById('karaokePlayText').textContent = 'Phát';
}

function playNextKaraokeLine() {
  if (karaokeIndex >= dialogueEntries.length) {
    isKaraokePlaying = false;
    document.getElementById('karaokePlayIcon').textContent = 'play_circle';
    document.getElementById('karaokePlayText').textContent = 'Phát';
    showToast('🎉 Phát hết cuộc thoại!', 'success');
    return;
  }

  if (!isKaraokePlaying) {
    return;
  }

  const entry = dialogueEntries[karaokeIndex];
  highlightCurrentLine();

  const utterance = new SpeechSynthesisUtterance(entry.hanzi);
  utterance.lang = 'zh-CN';
  utterance.rate = selectedRate;
  utterance.pitch = 1;

  if (selectedVoice) {
    utterance.voice = selectedVoice;
  }

  utterance.onend = () => {
    if (isKaraokePlaying) {
      karaokeIndex++;
      updateKaraokeProgress();
      
      if (karaokeIndex < dialogueEntries.length) {
        setTimeout(() => playNextKaraokeLine(), 300);
      } else {
        isKaraokePlaying = false;
        document.getElementById('karaokePlayIcon').textContent = 'play_circle';
        document.getElementById('karaokePlayText').textContent = 'Phát';
        showToast('🎉 Phát hết cuộc thoại!', 'success');
      }
    }
  };

  speechSynthesis.speak(utterance);
}

// ==================== AUDIO ====================
function playAudio(hanzi, pinyin, callback) {
  const utterance = new SpeechSynthesisUtterance(hanzi);
  utterance.lang = 'zh-CN';
  utterance.rate = selectedRate;
  utterance.pitch = 1;
  
  if (selectedVoice) {
    utterance.voice = selectedVoice;
  }
  
  if (callback) {
    utterance.onend = callback;
  }
  
  speechSynthesis.speak(utterance);
}

// ==================== UTILS ====================
function esc(str) {
  if (!str) return '';
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
  return String(str).replace(/[&<>"']/g, m => map[m]);
}

function showToast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `px-4 py-3 rounded-lg text-white font-medium shadow-lg animate-fadeIn ${
    type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500'
  }`;
  toast.textContent = msg;
  container.appendChild(toast);

  setTimeout(() => {
    toast.remove();
  }, 3000);
}

function goBack() {
  window.location.href = '/user/practice_dialogue_screen.html';
}

// ==================== WORD PUZZLE MODE ====================
function enterWordPuzzleMode() {
  isWordPuzzleMode = true;
  selectedWordPuzzleIndex = 0;

  // Hide list mode, show word puzzle mode
  document.getElementById('listModeContainer').classList.add('hidden');
  document.getElementById('wordPuzzleModeContainer').classList.remove('hidden');

  // Initialize puzzle data
  wordPuzzleData = dialogueEntries.map(entry => ({
    ...entry,
    original: entry.hanzi,
    vietnamese: entry.vietnamese,
    shuffled: shuffleText(entry.hanzi),
    answered: ''
  }));

  // Load first puzzle
  loadPuzzle(0);
  
  showToast('Bắt đầu trò chơi ghép chữ 🧩', 'success');
}

function exitWordPuzzleMode() {
  isWordPuzzleMode = false;
  
  // Show list mode, hide word puzzle mode
  document.getElementById('listModeContainer').classList.remove('hidden');
  document.getElementById('wordPuzzleModeContainer').classList.add('hidden');
  
  showToast('Thoát trò chơi ghép chữ', 'info');
}

function shuffleText(text) {
  // Convert text to array, remove spaces and punctuation, shuffle
  const chars = text.split('').filter(c => c.trim() !== '' && !/[，？！。]/.test(c));
  
  // Fisher-Yates shuffle
  for (let i = chars.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [chars[i], chars[j]] = [chars[j], chars[i]];
  }
  
  return chars;
}

function loadPuzzle(index) {
  if (index >= wordPuzzleData.length) {
    showToast('🎉 Hoàn thành tất cả các câu!', 'success');
    return;
  }

  selectedWordPuzzleIndex = index;
  const puzzle = wordPuzzleData[index];

  // Update header
  document.getElementById('puzzleCurrentIndex').textContent = index + 1;
  document.getElementById('puzzleTotalCount').textContent = wordPuzzleData.length;
  document.getElementById('puzzleOriginal').textContent = puzzle.original;
  document.getElementById('puzzleVietnamese').textContent = puzzle.vietnamese;
  document.getElementById('puzzlePinyin').textContent = puzzle.pinyin;

  // Reset pinyin hint visibility for new puzzle
  document.getElementById('puzzlePinyinContainer').classList.add('hidden');
  
  // Clear answer box and render words
  resetPuzzle();
}

function resetPuzzle() {
  const puzzle = wordPuzzleData[selectedWordPuzzleIndex];
  
  // Clear answer box
  document.getElementById('puzzleAnswerBox').innerHTML = '';
  puzzle.answered = '';

  // Render words
  const container = document.getElementById('puzzleWordsContainer');
  container.innerHTML = puzzle.shuffled.map((char, idx) => `
    <div class="word-item" onclick="selectWord(this, '${char}')">
      ${char}
    </div>
  `).join('');
}

function selectWord(element, char) {
  const puzzle = wordPuzzleData[selectedWordPuzzleIndex];
  const answerBox = document.getElementById('puzzleAnswerBox');
  
  // Create answer item
  const answerItem = document.createElement('div');
  answerItem.className = 'answer-item';
  answerItem.textContent = char;
  answerItem.onclick = () => {
    answerItem.remove();
    puzzle.answered = puzzle.answered.split(char).join('');
    element.classList.remove('selected');
    if (!document.body.contains(element)) {
      // Re-render if removed
      resetPuzzle();
    }
  };
  
  answerBox.appendChild(answerItem);
  puzzle.answered += char;
  element.classList.add('selected');
}

function checkPuzzleAnswer() {
  const puzzle = wordPuzzleData[selectedWordPuzzleIndex];
  const cleanOriginal = puzzle.original.replace(/[，？！。\s]/g, '');
  const cleanAnswered = puzzle.answered.replace(/[，？！。\s]/g, '');

  if (cleanAnswered === cleanOriginal) {
    showToast('✅ Chính xác!', 'success');
    // Auto-move to next after 1.5 seconds
    setTimeout(() => nextPuzzleLine(), 1500);
  } else {
    showToast('❌ Chưa đúng, hãy thử lại!', 'error');
  }
}

function nextPuzzleLine() {
  if (selectedWordPuzzleIndex < wordPuzzleData.length - 1) {
    loadPuzzle(selectedWordPuzzleIndex + 1);
  } else {
    showToast('🎉 Hoàn thành tất cả các câu!', 'success');
    setTimeout(() => exitWordPuzzleMode(), 2000);
  }
}

// ==================== PUZZLE HINT ====================
function showPinyinHint() {
  const container = document.getElementById('puzzlePinyinContainer');
  const isHidden = container.classList.contains('hidden');
  
  if (isHidden) {
    container.classList.remove('hidden');
    showToast('💡 Đã hiển thị phiên âm', 'info');
  } else {
    container.classList.add('hidden');
    showToast('💡 Đã ẩn phiên âm', 'info');
  }
}
