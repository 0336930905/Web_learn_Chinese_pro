    function loadRadicals() {
        allRadicals = radicalsData;
        filteredRadicals = allRadicals;
        renderRadicalsByStrokes(filteredRadicals);
        updateResultCount(filteredRadicals.length);
    }

    function renderRadicalsByStrokes(radicals) {
        const container = document.getElementById('radicalsContainer');
        container.innerHTML = '';
        
        if (radicals.length === 0) {
            document.getElementById('emptyState').classList.remove('hidden');
            return;
        }
        
        document.getElementById('emptyState').classList.add('hidden');

        // Group radicals by strokes
        const groupedByStrokes = {};
        radicals.forEach(radical => {
            if (!groupedByStrokes[radical.strokes]) {
                groupedByStrokes[radical.strokes] = [];
            }
            groupedByStrokes[radical.strokes].push(radical);
        });

        // Render each stroke group
        Object.keys(groupedByStrokes)
            .sort((a, b) => parseInt(a) - parseInt(b))
            .forEach(strokes => {
                const group = groupedByStrokes[strokes];
                const groupDiv = document.createElement('div');
                groupDiv.className = 'stroke-group animate-slideDown';
                
                // Group header
                const header = document.createElement('div');
                header.className = 'mb-4';
                header.innerHTML = `
                    <div class="flex items-center gap-3 pb-4">
                        <h2 class="text-lg font-bold text-on-surface flex items-center gap-2">
                            <span class="text-2xl text-primary font-black">${strokes}</span>
                            <span>nét</span>
                        </h2>
                        <span class="text-xs font-bold text-on-surface-variant bg-surface-container-low px-3 py-1 rounded-full">
                            ${group.length} bộ
                        </span>
                    </div>
                `;
                
                // Radicals grid
                const gridDiv = document.createElement('div');
                gridDiv.className = 'radicals-grid';
                
                group.forEach(radical => {
                    const card = document.createElement('button');
                    card.className = 'radical-card p-4 md:p-6 rounded-[1.25rem] hover:shadow-lg transition-smooth text-center flex flex-col items-center justify-center h-28 md:h-32 bg-surface-container-lowest';
                    card.onclick = () => showDetail(radical);
                    card.innerHTML = `
                        <div class="text-4xl md:text-5xl font-black text-primary mb-2">${radical.char}</div>
                        <div class="text-xs text-on-surface-variant font-bold">#${radical.number}</div>
                    `;
                    gridDiv.appendChild(card);
                });
                
                groupDiv.appendChild(header);
                groupDiv.appendChild(gridDiv);
                container.appendChild(groupDiv);
            });
    }

    function showDetail(radical) {
        const detailCard = document.getElementById('detailCard');
        document.getElementById('detailCharacter').textContent = radical.char;
        document.getElementById('detailCharLarge').textContent = radical.char;
        document.getElementById('detailVietnamName').textContent = radical.vietnameseName || '';
        document.getElementById('detailVietnamNameLarge').textContent = radical.vietnameseName || '';
        document.getElementById('detailPinyin').textContent = radical.pinyin;
        document.getElementById('detailMeaning').textContent = radical.meaning;
        document.getElementById('detailStrokes').textContent = radical.strokes;
        document.getElementById('detailNumber').textContent = `#${radical.number}`;
        document.getElementById('detailCategory').textContent = radical.category === 'common' ? '⭐ Thường dùng' : '📌 Ít dùng';
        
        const examplesDiv = document.getElementById('detailExamples');
        if (radical.mnemonic) {
            examplesDiv.innerHTML = `<p class="text-sm text-on-surface leading-relaxed">${radical.mnemonic}</p>`;
        } else {
            examplesDiv.innerHTML = (radical.examples || []).map(ex => `
                <div class="bg-surface-container hover:bg-surface-container-highest p-3 rounded-xl border border-outline-variant/20 hover:border-primary/40 transition-colors text-center cursor-default">
                    <p class="text-2xl font-bold text-primary">${ex}</p>
                </div>
            `).join('');
        }
        
        detailCard.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }

    function closeDetail() {
        document.getElementById('detailCard').classList.add('hidden');
        document.body.style.overflow = '';
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filterValue = document.getElementById('filterSelect').value;
        
        filteredRadicals = allRadicals.filter(r => {
            const matchesSearch = r.char.includes(query) || 
                r.pinyin.toLowerCase().includes(query) || 
                r.meaning.toLowerCase().includes(query);
            
            const matchesFilter = !filterValue || r.category === filterValue;
            
            return matchesSearch && matchesFilter;
        });
        
        renderRadicalsByStrokes(filteredRadicals);
        updateResultCount(filteredRadicals.length);
    });

    document.getElementById('filterSelect').addEventListener('change', (e) => {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filterValue = e.target.value;
        
        filteredRadicals = allRadicals.filter(r => {
            const matchesSearch = !query || r.char.includes(query) || 
                r.pinyin.toLowerCase().includes(query) || 
                r.meaning.toLowerCase().includes(query);
            
            const matchesFilter = !filterValue || r.category === filterValue;
            
            return matchesSearch && matchesFilter;
        });
        
        renderRadicalsByStrokes(filteredRadicals);
        updateResultCount(filteredRadicals.length);
    });

    function updateResultCount(count) {
        document.getElementById('resultCount').textContent = count;
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadRadicals();
        if (typeof initMobileMenu === 'function') {
            initMobileMenu();
        }
    });
</script>
</body>
</html>
